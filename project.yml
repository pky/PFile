name: PFile

options:
  bundleIdPrefix: jp.pky
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  createIntermediateGroups: true
  developmentLanguage: ja
  knownRegions:
    - en
    - ja

packages:
  AMSMB2:
    url: https://github.com/amosavian/AMSMB2
    from: 4.0.0

schemes:
  PFile:
    build:
      targets:
        PFile: all
        PFileTests: [testing]
    test:
      targets:
        - PFileTests
      commandLineArguments: {}
    run:
      config: Debug
    archive:
      config: Release

targets:
  PFileTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PFileTests
    settings:
      base:
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: PFile

  PFile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PFile
        excludes:
          - "Resources/Info.plist"
          - "GoogleService-Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.pky.pfile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        INFOPLIST_FILE: PFile/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGNING_ALLOWED: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
      configs:
        # Crashlytics がdSYMを処理できるようDebugでもdSYMを生成する
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    dependencies:
      - package: AMSMB2
        embed: true
    postBuildScripts:
      - name: "[Firebase] Crashlytics dSYM Upload"
        script: |
          if [ -f "${SRCROOT}/PFile/GoogleService-Info.plist" ]; then
            "${PODS_ROOT}/FirebaseCrashlytics/run"
          else
            echo "Skipping Crashlytics dSYM upload because GoogleService-Info.plist is not present."
          fi
        inputFiles:
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${TARGET_NAME}"
          - "$(SRCROOT)/$(BUILT_PRODUCTS_DIR)/$(INFOPLIST_PATH)"
        showEnvVars: false
    info:
      path: PFile/Resources/Info.plist
      properties:
        CFBundleDisplayName: PFile
        CFBundleDevelopmentRegion: ja
        CFBundleLocalizations:
          - ja
          - en
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UIRequiresFullScreen: true
        NSLocalNetworkUsageDescription: "ネットワーク上のファイルへアクセスするために使用します"
        NSPhotoLibraryUsageDescription: "写真と動画を表示するために使用します"
        NSBonjourServices:
          - "_smb._tcp"
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
